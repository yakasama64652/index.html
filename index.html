<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAVA Search + AI</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #202124;
            --nav-link: rgba(0,0,0,0.87);
            --search-border: #dfe1e5;
            --btn-bg: #f8f9fa;
            --btn-text: #3c4043;
            --footer-bg: #f2f2f2;
            --result-link: #1a0dab;
            --result-desc: #4d5156;
            --suggestion-hover: #f1f3f4;
            --ai-accent: #8ab4f8;
        }

        [data-theme="dark"] {
            --bg-color: #202124;
            --text-color: #e8eaed;
            --nav-link: #e8eaed;
            --search-border: #5f6368;
            --btn-bg: #303134;
            --btn-text: #e8eaed;
            --footer-bg: #171717;
            --result-link: #8ab4f8;
            --result-desc: #bdc1c6;
            --suggestion-hover: #3c4043;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background 0.3s, color 0.3s;
        }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; }
        .nav-left, .nav-right { display: flex; gap: 15px; font-size: 13px; align-items: center; }
        nav a { text-decoration: none; color: var(--nav-link); cursor: pointer; }
        nav a:hover { text-decoration: underline; }

        #theme-toggle { background: none; border: none; cursor: pointer; padding: 5px; color: var(--nav-link); }

        main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.3s ease; }
        main.searching { justify-content: flex-start; padding-top: 20px; }

        .logo { width: 272px; margin-bottom: 30px; transition: width 0.3s; cursor: pointer; }
        main.searching .logo { width: 120px; margin-bottom: 20px; }

        .search-container { width: 100%; display: flex; flex-direction: column; align-items: center; position: relative; }
        .search-bar-wrapper { 
            display: flex; align-items: center; 
            border: 1px solid var(--search-border); border-radius: 24px;
            width: 584px; max-width: 90%; padding: 5px 15px;
            background: var(--bg-color); z-index: 10;
        }

        .search-bar-wrapper input { border: none; outline: none; height: 34px; font-size: 16px; flex-grow: 1; background: transparent; color: var(--text-color); }

        #suggestions-list {
            width: 584px; max-width: 90%; background: var(--bg-color);
            border: 1px solid var(--search-border); border-top: none;
            border-radius: 0 0 24px 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: none; position: absolute; top: 45px; list-style: none; padding: 10px 0; z-index: 5;
        }

        .suggestion-item { padding: 10px 20px; cursor: pointer; }
        .suggestion-item:hover { background-color: var(--suggestion-hover); }

        .buttons { margin-top: 30px; display: flex; gap: 12px; }
        .btn { background-color: var(--btn-bg); border: 1px solid var(--btn-bg); border-radius: 4px; padding: 0 16px; line-height: 36px; cursor: pointer; color: var(--btn-text); }

        #results-area { margin-top: 30px; width: 652px; max-width: 90%; display: none; }

        /* AI BOX STYLING */
        #ai-box {
            background: var(--btn-bg);
            border: 1px solid var(--search-border);
            border-left: 4px solid var(--ai-accent);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            animation: fadeIn 0.5s ease;
        }

        .result-item { padding: 15px 0; border-bottom: 1px solid var(--search-border); }
        .result-item a { color: var(--result-link); font-size: 20px; text-decoration: none; }
        .result-desc { color: var(--result-desc); margin-top: 5px; font-size: 14px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        footer { background: var(--footer-bg); font-size: 14px; margin-top: auto; padding: 15px 30px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left"><a id="home-link">Home</a></div>
        <div class="nav-right">
            <button id="theme-toggle">
                <svg id="theme-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 3c.132 0 .263 0 .393.007a9 9 0 0 0 7.5 13.5A9 9 0 1 1 12 3z"/></svg>
            </button>
            <a href="#">LAVA Mail</a>
            <a href="#">Images</a>
            <div style="background: #5f6368; width: 32px; height: 32px; border-radius: 50%;"></div>
        </div>
    </nav>

    <main id="main-content">
        <img src="https://48034691.fs1.hubspotusercontent-na1.net/hubfs/48034691/__hs-marketplace__/LAVA%20Logo%20-%20Black-1.png" alt="LAVA" class="logo" id="main-logo">
        <div class="search-container">
            <div class="search-bar-wrapper">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="#9aa0a6" style="margin-right:10px;"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
                <input type="text" id="search-input" autocomplete="off" autofocus placeholder="Search LAVA or ask a question...">
            </div>
            <ul id="suggestions-list"></ul>
            <div class="buttons" id="button-row">
                <button class="btn" id="search-btn">LAVA Search</button>
                <button class="btn">I'm Feeling Productive</button>
            </div>
            
            <div id="results-area">
                <div id="ai-box" style="display:none;">
                    <div style="font-weight: bold; margin-bottom: 8px; color: var(--ai-accent); font-size: 12px; text-transform: uppercase; display: flex; align-items: center; gap: 8px;">
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M8 16a8 8 0 1 0 0-16 8 8 0 0 0 0 16zm.5-13v2.5a.5.5 0 0 1-1 0V3a.5.5 0 0 1 1 0zm0 10v2.5a.5.5 0 0 1-1 0V13a.5.5 0 0 1 1 0zM13 8.5h2.5a.5.5 0 0 1 0 1H13a.5.5 0 0 1 0-1zM3 8.5h2.5a.5.5 0 0 1 0 1H3a.5.5 0 0 1 0-1z"/></svg>
                        AI Overview
                    </div>
                    <div id="ai-text" style="line-height: 1.6;">Thinking...</div>
                </div>
                <div id="web-results"></div>
            </div>
        </div>
    </main>

    <footer>
        <span>Australia</span>
        <div style="display:flex; gap:20px"><span>Privacy</span><span>Terms</span></div>
    </footer>

    <script>
        const database = [
            { keywords: ["hubstaff", "time tracking", "productivity"], url: "https://hubstaff.com/", title: "Hubstaff - Time Tracking", description: "The all-in-one work management platform." },
            { keywords: ["lava university", "learn", "training"], url: "https://university.lavaautomation.com", title: "Lava University", description: "The official training platform for LAVA experts." },
            { keywords: ["lava automation", "home", "company"], url: "https://www.lavaautomation.com", title: "LAVA Automation", description: "Innovative automation solutions for business growth." },
            { keywords: ["world time buddy", "timezone", "time converter"], url: "https://www.worldtimebuddy.com/", title: "World Time Buddy", description: "Visual world clock and time zone converter." }
        ];

        const searchInput = document.getElementById('search-input');
        const resultsArea = document.getElementById('results-area');
        const aiBox = document.getElementById('ai-box');
        const aiText = document.getElementById('ai-text');
        const webResults = document.getElementById('web-results');
        const suggestionsList = document.getElementById('suggestions-list');

        // Theme Management
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            document.getElementById('theme-icon').innerHTML = theme === 'dark' 
                ? '<path d="M12 7a5 5 0 1 1-4.992 5.002A5 5 0 0 1 12 7.002zm0 2a3 3 0 1 0 2.995 3.003A3 3 0 0 0 12 9.002zM11 1h2v3h-2V1zm0 19h2v3h-2v-3zM3.515 4.929l1.414-1.414L7.05 5.636 5.636 7.05 3.515 4.93zM16.95 18.364l1.414-1.414 2.121 2.121-1.414 1.414-2.121-2.121zm2.121-14.85l1.414 1.415-2.121 2.121-1.415-1.414 2.121-2.121zM5.636 16.95l1.414 1.414-2.121 2.121-1.414-1.414 2.121-2.121zM23 11v2h-3v-2h3zM4 11v2H1v-2h3z"/>'
                : '<path d="M12 3c.132 0 .263 0 .393.007a9 9 0 0 0 7.5 13.5A9 9 0 1 1 12 3z"/>';
        }

        document.getElementById('theme-toggle').onclick = () => {
            const current = document.documentElement.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        };
        setTheme(localStorage.getItem('theme') || 'light');

        // Search Execution
        async function performSearch() {
            const query = searchInput.value.trim().toLowerCase();
            if (!query) return;

            document.getElementById('main-content').classList.add('searching');
            document.getElementById('button-row').style.display = "none";
            resultsArea.style.display = "block";
            suggestionsList.style.display = "none";

            // 1. AI Simulated Logic
            aiBox.style.display = "block";
            aiText.innerText = "Scanning LAVA database...";
            
            setTimeout(() => {
                if (query.includes("university") || query.includes("learn")) {
                    aiText.innerHTML = "<strong>Lava University</strong> is our specialized training hub. It offers certification for automation experts. You can access it directly at <u>university.lavaautomation.com</u>.";
                } else if (query.includes("time") || query.includes("hubstaff")) {
                    aiText.innerHTML = "For productivity, we recommend <strong>Hubstaff</strong> for time tracking and <strong>World Time Buddy</strong> for managing global team schedules.";
                } else {
                    aiText.innerHTML = `Regarding "${query}": I'm currently in 'local-only' mode. To get full AI capabilities, connect this box to the Gemini or OpenAI API.`;
                }
            }, 800);

            // 2. Database Matching
            const matches = database.filter(item => 
                item.title.toLowerCase().includes(query) || 
                item.keywords.some(k => k.includes(query))
            );

            webResults.innerHTML = matches.map(item => `
                <div class="result-item">
                    <div style="font-size:12px; color:gray; margin-bottom:4px;">${item.url}</div>
                    <a href="${item.url}" target="_blank">${item.title}</a>
                    <p class="result-desc">${item.description}</p>
                </div>
            `).join('') || `<p style="margin-top:20px;">No exact matches found in local directory.</p>`;
        }

        // Event Listeners
        searchInput.oninput = () => {
            const val = searchInput.value.toLowerCase().trim();
            if (!val) { suggestionsList.style.display = "none"; return; }
            const matches = database.filter(i => i.title.toLowerCase().includes(val));
            suggestionsList.innerHTML = matches.map(m => `<li class="suggestion-item" onclick="selectSug('${m.title}')">${m.title}</li>`).join('');
            suggestionsList.style.display = matches.length ? "block" : "none";
        };

        window.selectSug = (t) => { searchInput.value = t; performSearch(); };
        searchInput.onkeypress = e => e.key === 'Enter' && performSearch();
        document.getElementById('search-btn').onclick = performSearch;
        document.getElementById('home-link').onclick = () => location.reload();
        document.getElementById('main-logo').onclick = () => location.reload();
    </script>
</body>
</html>
