<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAVA Search</title>
    <style>
        :root {
            --bg-color: #ffffff; --text-color: #202124; --nav-link: rgba(0,0,0,0.87);
            --search-border: #dfe1e5; --btn-bg: #f8f9fa; --btn-text: #3c4043;
            --footer-bg: #f2f2f2; --result-link: #1a0dab; --result-desc: #4d5156;
            --suggestion-hover: #f1f3f4; --accent-color: #1a73e8; --sidebar-bg: #ffffff;
        }
        [data-theme="dark"] {
            --bg-color: #202124; --text-color: #e8eaed; --nav-link: #e8eaed;
            --search-border: #5f6368; --btn-bg: #303134; --btn-text: #e8eaed;
            --footer-bg: #171717; --result-link: #8ab4f8; --result-desc: #bdc1c6;
            --suggestion-hover: #3c4043; --accent-color: #8ab4f8; --sidebar-bg: #2d2e30;
        }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; background-color: var(--bg-color); color: var(--text-color); transition: background 0.3s, color 0.3s; overflow-x: hidden; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; }
        .nav-left, .nav-right { display: flex; gap: 15px; font-size: 13px; align-items: center; }
        nav a { text-decoration: none; color: var(--nav-link); cursor: pointer; }
        #theme-toggle { background: none; border: none; cursor: pointer; padding: 5px; color: var(--nav-link); }

        main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.3s ease; }
        main.searching { justify-content: flex-start; padding-top: 20px; }
        .logo { width: 272px; margin-bottom: 30px; transition: width 0.3s; cursor: pointer; }
        main.searching .logo { width: 150px; margin-bottom: 20px; }

        .search-container { width: 100%; display: flex; flex-direction: column; align-items: center; position: relative; }
        .search-bar-wrapper { display: flex; align-items: center; border: 1px solid var(--search-border); border-radius: 24px; width: 584px; max-width: 90%; padding: 5px 15px; background: var(--bg-color); z-index: 10; position: relative; }
        .search-bar-wrapper input { border: none; outline: none; height: 34px; font-size: 16px; flex-grow: 1; padding: 0 10px; background: transparent; color: var(--text-color); }
        
        #suggestions-list { width: 100%; background: var(--bg-color); border: 1px solid var(--search-border); border-top: none; border-radius: 0 0 24px 24px; display: none; position: absolute; top: 35px; left: 0; list-style: none; padding: 10px 0; margin: 0; z-index: 5; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .suggestion-item { padding: 10px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .suggestion-item:hover { background-color: var(--suggestion-hover); }

        .search-tabs { display: none; width: 584px; max-width: 90%; margin-top: 20px; border-bottom: 1px solid var(--search-border); gap: 20px; }
        .tab { padding: 10px 5px; cursor: pointer; font-size: 14px; color: var(--result-desc); border-bottom: 3px solid transparent; }
        .tab.active { color: var(--accent-color); border-bottom: 3px solid var(--accent-color); font-weight: bold; }

        .buttons { margin-top: 30px; display: flex; gap: 12px; }
        .btn { background-color: var(--btn-bg); border: 1px solid var(--btn-bg); border-radius: 4px; padding: 0 16px; line-height: 36px; cursor: pointer; color: var(--btn-text); font-size: 14px; }

        #results-area { margin-top: 20px; width: 584px; max-width: 90%; display: none; }
        .result-item { padding: 20px 0; border-bottom: 1px solid var(--search-border); text-align: left; }
        .result-item a { color: var(--result-link); font-size: 20px; text-decoration: none; }
        .result-item .result-url { font-size: 14px; color: var(--text-color); opacity: 0.7; }
        
        /* Quick Look Button */
        .quick-look-btn { font-size: 12px; color: var(--accent-color); background: none; border: 1px solid var(--accent-color); border-radius: 12px; padding: 2px 8px; margin-left: 10px; cursor: pointer; vertical-align: middle; }
        .quick-look-btn:hover { background: var(--accent-color); color: white; }

        /* SIDE PANEL STYLES */
        #side-panel { position: fixed; right: -450px; top: 0; width: 400px; height: 100%; background: var(--sidebar-bg); border-left: 1px solid var(--search-border); box-shadow: -5px 0 15px rgba(0,0,0,0.1); transition: right 0.3s ease; z-index: 1000; padding: 20px; overflow-y: auto; }
        #side-panel.open { right: 0; }
        .close-panel { font-size: 24px; cursor: pointer; float: right; color: var(--text-color); }
        .panel-content h2 { color: var(--accent-color); margin-top: 40px; }
        .panel-preview-img { width: 100%; height: 200px; background: #eee; border-radius: 8px; margin: 15px 0; display: flex; align-items: center; justify-content: center; color: #999; }
        
        footer { background: var(--footer-bg); font-size: 14px; margin-top: auto; border-top: 1px solid var(--search-border); }
        .footer-bottom { display: flex; justify-content: space-between; padding: 15px 30px; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-left"><a onclick="location.reload()">Home</a></div>
        <div class="nav-right">
            <button id="theme-toggle"><svg id="theme-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"></svg></button>
            <a href="#">LAVA Mail</a><a href="#">Images</a>
        </div>
    </nav>

    <div id="side-panel">
        <span class="close-panel" onclick="closePanel()">&times;</span>
        <div class="panel-content" id="panel-content">
            </div>
    </div>

    <main id="main-content">
        <img src="https://48034691.fs1.hubspotusercontent-na1.net/hubfs/48034691/__hs-marketplace__/LAVA%20Logo%20-%20Black-1.png" alt="LAVA" class="logo" onclick="location.reload()">
        <div class="search-container">
            <div class="search-bar-wrapper">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="#9aa0a6"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
                <input type="text" id="search-input" autocomplete="off" autofocus placeholder="Search LAVA...">
                <ul id="suggestions-list"></ul>
            </div>
            
            <div class="search-tabs" id="search-tabs">
                <div class="tab active" data-type="all" onclick="switchTab('all')">All</div>
                <div class="tab" data-type="images" onclick="switchTab('images')">Images</div>
                <div class="tab" data-type="videos" onclick="switchTab('videos')">Videos</div>
                <div class="tab" data-type="presentation" onclick="switchTab('presentation')">Presentation</div>
            </div>

            <div class="buttons" id="button-row">
                <button class="btn" id="search-btn">LAVA Search</button>
                <button class="btn" id="ama-btn">Ask Me Anything</button>
            </div>
            <div id="results-area"></div>
        </div>
    </main>
    <footer><div class="footer-bottom"><span>Australia</span><span>Privacy & Terms</span></div></footer>

    <script>
        const database = [
            { type: "all", keywords: ["hubstaff"], url: "https://hubstaff.com/", title: "Hubstaff - Time Tracking", description: "The all-in-one work management platform." },
            { type: "all", keywords: ["lava university"], url: "https://university.lavaautomation.com", title: "Lava University", description: "Official training platform for LAVA experts." },
            { type: "videos", keywords: ["insurance", "commercial"], url: "https://vimeo.com/1123938577", title: "Commercial Insurance Overview", description: "Overview of common business coverage." }
        ];

        const searchInput = document.getElementById('search-input');
        const resultsArea = document.getElementById('results-area');
        const mainContent = document.getElementById('main-content');
        const buttonRow = document.getElementById('button-row');
        const searchTabs = document.getElementById('search-tabs');
        const suggestionsList = document.getElementById('suggestions-list');
        const sidePanel = document.getElementById('side-panel');
        const panelContent = document.getElementById('panel-content');
        
        let currentTab = 'all';

        // Suggestions Logic
        searchInput.addEventListener('input', () => {
            const query = searchInput.value.toLowerCase().trim();
            suggestionsList.innerHTML = '';
            if (query) {
                const matches = database.filter(item => item.title.toLowerCase().includes(query)).slice(0, 5);
                if (matches.length > 0) {
                    suggestionsList.style.display = 'block';
                    matches.forEach(item => {
                        const li = document.createElement('li');
                        li.className = 'suggestion-item';
                        li.innerText = item.title;
                        li.onclick = () => { searchInput.value = item.title; performSearch(); };
                        suggestionsList.appendChild(li);
                    });
                }
            } else { suggestionsList.style.display = 'none'; }
        });

        function performSearch() {
            const query = searchInput.value.toLowerCase().trim();
            if (!query) return;
            suggestionsList.style.display = 'none';
            mainContent.classList.add('searching');
            buttonRow.style.display = 'none';
            searchTabs.style.display = 'flex';
            resultsArea.style.display = 'block';
            renderResults(query);
        }

        function renderResults(query) {
            const filtered = database.filter(item => {
                const match = item.title.toLowerCase().includes(query) || item.keywords.some(k => k.includes(query));
                return currentTab === 'all' ? match : (match && item.type === currentTab);
            });

            resultsArea.innerHTML = filtered.map((item, index) => `
                <div class="result-item">
                    <span class="result-url">${item.url}</span>
                    <button class="quick-look-btn" onclick="openPanel(${index})">Quick Look</button><br>
                    <a href="${item.url}" target="_blank">${item.title}</a>
                    <p class="result-desc">${item.description}</p>
                </div>`).join('');
        }

        // SIDE PANEL LOGIC
        window.openPanel = (index) => {
            const item = database[index];
            panelContent.innerHTML = `
                <h2>${item.title}</h2>
                <div class="panel-preview-img">Preview of ${new URL(item.url).hostname}</div>
                <p><strong>URL:</strong> <a href="${item.url}" target="_blank">${item.url}</a></p>
                <p><strong>Description:</strong> ${item.description}</p>
                <hr style="border:0; border-top:1px solid var(--search-border); margin:20px 0;">
                <p>LAVA AI Insight: This resource is highly recommended for users interested in ${item.keywords[0]}.</p>
                <button class="btn" onclick="window.open('${item.url}', '_blank')" style="width:100%">Visit Website</button>
            `;
            sidePanel.classList.add('open');
        };

        window.closePanel = () => { sidePanel.classList.remove('open'); };

        window.switchTab = (tabName) => {
            currentTab = tabName;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-type="${tabName}"]`).classList.add('active');
            renderResults(searchInput.value);
        };

        document.getElementById('ama-btn').onclick = () => {
            if(searchInput.value) localStorage.setItem('lava_last_query', searchInput.value);
            window.location.href = 'ama.html';
        };

        document.getElementById('search-btn').onclick = performSearch;
        searchInput.onkeypress = (e) => { if (e.key === 'Enter') performSearch(); };
        
        // Theme Logic
        const themeIcon = document.getElementById('theme-icon');
        function setTheme(t) {
            document.documentElement.setAttribute('data-theme', t); localStorage.setItem('theme', t);
            themeIcon.innerHTML = t === 'dark' ? '<path d="M12 7a5 5 0 1 1-4.992 5.002A5 5 0 0 1 12 7.002zM11 1h2v3h-2V1z"/>' : '<path d="M12 3c.132 0 .263 0 .393.007a9 9 0 0 0 7.5 13.5A9 9 0 1 1 12 3z"/>';
        }
        setTheme(localStorage.getItem('theme') || 'light');
        document.getElementById('theme-toggle').onclick = () => setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    </script>
</body>
</html>
