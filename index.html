<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAVA Search</title>
    <style>
        :root {
            --bg-color: #ffffff; --text-color: #202124; --nav-link: rgba(0,0,0,0.87);
            --search-border: #dfe1e5; --btn-bg: #f8f9fa; --btn-text: #3c4043;
            --footer-bg: #f2f2f2; --result-link: #1a0dab; --result-desc: #4d5156;
            --suggestion-hover: #f1f3f4; --accent-color: #1a73e8;
            --chat-bg: #ffffff; --chat-accent: #1a73e8;
        }
        [data-theme="dark"] {
            --bg-color: #202124; --text-color: #e8eaed; --nav-link: #e8eaed;
            --search-border: #5f6368; --btn-bg: #303134; --btn-text: #e8eaed;
            --footer-bg: #171717; --result-link: #8ab4f8; --result-desc: #bdc1c6;
            --suggestion-hover: #3c4043; --accent-color: #8ab4f8;
            --chat-bg: #1e1f20;
        }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; background-color: var(--bg-color); color: var(--text-color); transition: background 0.3s, color 0.3s; overflow-x: hidden; }
        
        /* NAVIGATION */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; }
        .nav-left, .nav-right { display: flex; gap: 15px; font-size: 13px; align-items: center; }
        nav a { text-decoration: none; color: var(--nav-link); cursor: pointer; }
        #theme-toggle { background: none; border: none; cursor: pointer; padding: 5px; display: flex; align-items: center; color: var(--nav-link); }
        
        /* MAIN SEARCH AREA */
        main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.3s ease; }
        main.searching { justify-content: flex-start; padding-top: 20px; }
        .logo { width: 272px; margin-bottom: 30px; transition: width 0.3s; cursor: pointer; }
        main.searching .logo { width: 150px; margin-bottom: 20px; }
        
        .search-container { width: 100%; display: flex; flex-direction: column; align-items: center; position: relative; }
        .search-bar-wrapper { display: flex; align-items: center; border: 1px solid var(--search-border); border-radius: 24px; width: 584px; max-width: 90%; padding: 5px 15px; background: var(--bg-color); z-index: 10; position: relative; }
        .search-bar-wrapper:hover, .search-bar-wrapper:focus-within { box-shadow: 0 1px 6px rgba(32,33,36,.28); border-color: transparent; }
        .search-bar-wrapper input { border: none; outline: none; height: 34px; font-size: 16px; flex-grow: 1; padding: 0 10px; background: transparent; color: var(--text-color); }
        
        #suggestions-list { width: 100%; background: var(--bg-color); border: 1px solid var(--search-border); border-top: none; border-radius: 0 0 24px 24px; display: none; position: absolute; top: 35px; left: 0; list-style: none; padding: 10px 0; margin: 0; z-index: 5; box-shadow: 0 4px 6px rgba(32,33,36,.28); }
        .suggestion-item { padding: 10px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .suggestion-item:hover { background-color: var(--suggestion-hover); }

        .search-tabs { display: none; width: 584px; max-width: 90%; margin-top: 20px; border-bottom: 1px solid var(--search-border); gap: 20px; }
        .tab { padding: 10px 5px; cursor: pointer; font-size: 14px; color: var(--result-desc); border-bottom: 3px solid transparent; }
        .tab.active { color: var(--accent-color); border-bottom: 3px solid var(--accent-color); font-weight: bold; }
        
        .buttons { margin-top: 30px; display: flex; gap: 12px; }
        .btn { background-color: var(--btn-bg); border: 1px solid var(--btn-bg); border-radius: 4px; padding: 0 16px; line-height: 36px; cursor: pointer; color: var(--btn-text); font-size: 14px; }
        
        /* RESULTS AREA */
        #results-area { margin-top: 20px; width: 584px; max-width: 90%; display: none; }
        .result-item { padding: 20px 0; border-bottom: 1px solid var(--search-border); text-align: left; animation: fadeIn 0.3s ease; }
        .result-item a { color: var(--result-link); font-size: 20px; text-decoration: none; }
        .result-item .result-url { font-size: 14px; color: var(--text-color); opacity: 0.7; display: block; }

        /* CUSTOM CHAT BUBBLE (YOUR LOGO) */
        .ama-bubble { 
            position: fixed; 
            bottom: 25px; 
            right: 25px; 
            width: 70px; 
            height: 70px; 
            background: transparent; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            z-index: 1001; 
            transition: transform 0.3s ease; 
            animation: bubbleBounce 3s infinite ease-in-out; 
        }
        .ama-bubble:hover { transform: scale(1.15); }
        .ama-bubble img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
        }
        @keyframes bubbleBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* CHAT WINDOW */
        .chat-window { position: fixed; bottom: 105px; right: 25px; width: 350px; height: 500px; background: var(--chat-bg); border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); display: none; flex-direction: column; z-index: 1000; overflow: hidden; border: 1px solid var(--search-border); animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .chat-header { background: var(--chat-accent); color: white; padding: 18px; display: flex; justify-content: space-between; align-items: center; font-weight: 600; }
        .chat-messages { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; font-size: 14px; scrollbar-width: none; }
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 80%; line-height: 1.4; }
        .msg.user { align-self: flex-end; background: var(--chat-accent); color: white; border-bottom-right-radius: 4px; }
        .msg.ai { align-self: flex-start; background: var(--btn-bg); color: var(--text-color); border: 1px solid var(--search-border); border-bottom-left-radius: 4px; }
        
        .chat-input-area { padding: 15px; border-top: 1px solid var(--search-border); display: flex; gap: 10px; background: var(--bg-color); }
        .chat-input-area input { flex-grow: 1; border: 1px solid var(--search-border); border-radius: 24px; padding: 10px 18px; outline: none; background: var(--btn-bg); color: var(--text-color); font-family: inherit; }
        .chat-send-btn { background: none; border: none; color: var(--chat-accent); cursor: pointer; font-weight: bold; font-size: 14px; }
        
        .resource-card { display: block; margin-top: 8px; padding: 10px; border: 1px solid var(--search-border); border-radius: 8px; text-decoration: none; color: inherit; font-size: 12px; background: rgba(0,0,0,0.03); transition: 0.2s; }
        .resource-card:hover { border-color: var(--chat-accent); background: rgba(26, 115, 232, 0.05); }

        footer { background: var(--footer-bg); font-size: 14px; margin-top: auto; border-top: 1px solid var(--search-border); }
        .footer-bottom { display: flex; justify-content: space-between; padding: 15px 30px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <nav>
        <div class="nav-left"><a onclick="location.reload()">Home</a></div>
        <div class="nav-right">
            <button id="theme-toggle"><svg id="theme-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"></svg></button>
            <a href="#">LAVA Mail</a><a href="#">Images</a>
        </div>
    </nav>

    <main id="main-content">
        <img src="https://48034691.fs1.hubspotusercontent-na1.net/hubfs/48034691/__hs-marketplace__/LAVA%20Logo%20-%20Black-1.png" alt="LAVA" class="logo" id="main-logo">
        <div class="search-container">
            <div class="search-bar-wrapper">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="#9aa0a6"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
                <input type="text" id="search-input" autocomplete="off" autofocus placeholder="Search LAVA...">
                <ul id="suggestions-list"></ul>
            </div>
            
            <div class="search-tabs" id="search-tabs">
                <div class="tab active" data-type="all" onclick="switchTab('all')">All</div>
                <div class="tab" data-type="images" onclick="switchTab('images')">Images</div>
                <div class="tab" data-type="videos" onclick="switchTab('videos')">Videos</div>
                <div class="tab" data-type="presentation" onclick="switchTab('presentation')">Presentation</div>
            </div>

            <div class="buttons" id="button-row">
                <button class="btn" id="search-btn">LAVA Search</button>
                <button class="btn" id="simulators-btn" onclick="window.location.href='simulators.html'">Simulators</button>
                <button class="btn" id="faq-btn" onclick="window.location.href='faq.html'">FAQ</button>
                <button class="btn" id="ama-btn" onclick="toggleChat()">Ask Me Anything</button>
                <button class="btn" id="wfh-btn" onclick="window.open('https://work-at-homelavava.netlify.app/', '_blank')">WFH status</button>
            </div>
            <div id="results-area"></div>
        </div>
    </main>

    <div class="ama-bubble" onclick="toggleChat()">
        <img src="kling_20260422_VIDEO__1217_0.gif" alt="LAVA AI">
    </div>

    <div class="chat-window" id="chat-window">
        <div class="chat-header">
            <span>Ask LAVA</span>
            <span style="cursor:pointer" onclick="toggleChat()">✕</span>
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="msg ai">Hi! I'm the LAVA assistant. How can I help you today?</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="widget-input" placeholder="Ask a question..." autocomplete="off">
            <button class="chat-send-btn" onclick="handleWidgetSubmit()">Send</button>
        </div>
    </div>

    <footer><div class="footer-bottom"><span>Australia</span><span>Privacy & Terms</span></div></footer>

    <script>
        // --- CHAT LOGIC ---
        const amaDatabase = [
            { keywords: ["hubstaff"], url: "https://hubstaff.com/", title: "Hubstaff", desc: "Work management platform." },
            { keywords: ["university", "lava university"], url: "https://university.lavaautomation.com", title: "Lava University", desc: "Training platform." },
            { keywords: ["security", "soc 2"], answer: "LAVA is SOC 2 Type 1 certified and undergoing Type 2." },
            { keywords: ["training", "days"], answer: "VA training is intense for the first 60 days." }
        ];

        function toggleChat() {
            const win = document.getElementById('chat-window');
            win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
            if(win.style.display === 'flex') document.getElementById('widget-input').focus();
        }

        function handleWidgetSubmit() {
            const input = document.getElementById('widget-input');
            const query = input.value.trim();
            if(!query) return;

            addMsg(query, 'user');
            input.value = '';

            setTimeout(() => {
                const lower = query.toLowerCase();
                const match = amaDatabase.find(item => item.keywords.some(k => lower.includes(k)));
                
                if(match) {
                    if(match.answer) addMsg(match.answer, 'ai');
                    else addMsg(`I found this: <a href="${match.url}" target="_blank" class="resource-card"><strong>${match.title}</strong><br>${match.desc}</a>`, 'ai');
                } else {
                    addMsg("I'm not sure about that. Try asking about Hubstaff, Security, or Training.", 'ai');
                }
            }, 600);
        }

        function addMsg(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerHTML = text;
            const container = document.getElementById('chat-messages');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById('widget-input').onkeypress = (e) => { if(e.key === 'Enter') handleWidgetSubmit(); };

        // --- SEARCH LOGIC ---
        const database = [
            { type: "all", keywords: ["hubstaff", "time tracking"], url: "https://hubstaff.com/", title: "Hubstaff - Time Tracking", description: "The all-in-one work management platform." },
            { type: "all", keywords: ["lava university", "learn"], url: "https://university.lavaautomation.com", title: "Lava University", description: "Official training platform." },
            { type: "all", keywords: ["lava automation"], url: "https://www.lavaautomation.com", title: "LAVA Automation", description: "Innovative automation solutions." }
        ];

        const searchInput = document.getElementById('search-input');
        const resultsArea = document.getElementById('results-area');
        const mainContent = document.getElementById('main-content');
        const buttonRow = document.getElementById('button-row');
        const searchTabs = document.getElementById('search-tabs');
        const suggestionsList = document.getElementById('suggestions-list');

        searchInput.addEventListener('input', () => {
            const query = searchInput.value.toLowerCase().trim();
            suggestionsList.innerHTML = '';
            if (query) {
                const matches = database.filter(item => item.title.toLowerCase().includes(query)).slice(0, 6);
                if (matches.length > 0) {
                    suggestionsList.style.display = 'block';
                    matches.forEach(item => {
                        const li = document.createElement('li');
                        li.className = 'suggestion-item';
                        li.innerText = item.title;
                        li.onclick = () => { searchInput.value = item.title; performSearch(); };
                        suggestionsList.appendChild(li);
                    });
                } else suggestionsList.style.display = 'none';
            } else suggestionsList.style.display = 'none';
        });

        function performSearch() {
            const query = searchInput.value.toLowerCase().trim();
            if (!query) return;
            suggestionsList.style.display = 'none';
            mainContent.classList.add('searching');
            buttonRow.style.display = 'none';
            searchTabs.style.display = 'flex';
            resultsArea.style.display = 'block';
            renderResults(query);
        }

        function renderResults(query) {
            const filtered = database.filter(item => item.title.toLowerCase().includes(query));
            resultsArea.innerHTML = filtered.map(item => `
                <div class="result-item">
                    <span class="result-url">${item.url}</span>
                    <a href="${item.url}" target="_blank">${item.title}</a>
                    <p class="result-desc">${item.description}</p>
                </div>`).join('');
        }

        document.getElementById('search-btn').onclick = performSearch;
        searchInput.onkeypress = (e) => { if (e.key === 'Enter') performSearch(); };

        // --- THEME SYNC ---
        const themeIcon = document.getElementById('theme-icon');
        function setTheme(t) {
            document.documentElement.setAttribute('data-theme', t); localStorage.setItem('theme', t);
            themeIcon.innerHTML = t === 'dark' ? '<path d="M12 7a5 5 0 1 1-4.992 5.002A5 5 0 0 1 12 7.002zM11 1h2v3h-2V1z"/>' : '<path d="M12 3c.132 0 .263 0 .393.007a9 9 0 0 0 7.5 13.5A9 9 0 1 1 12 3z"/>';
            
            // Sync logo filter for dark mode
            const mainLogo = document.getElementById('main-logo');
            if (t === 'dark') {
                mainLogo.style.filter = 'brightness(0) invert(1)';
            } else {
                mainLogo.style.filter = 'none';
            }
        }
        setTheme(localStorage.getItem('theme') || 'light');
        document.getElementById('theme-toggle').onclick = () => setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    </script>
</body>
</html>
